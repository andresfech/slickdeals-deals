<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SlickDeals — Best Deals Last 24h</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #f97316; }
    header span { font-size: 0.85rem; color: #64748b; }

    .controls {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input, .field select {
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      min-width: 200px;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #f97316;
    }

    button#runBtn {
      background: #f97316;
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      height: 38px;
      align-self: flex-end;
    }
    button#runBtn:hover { background: #ea6c0a; }
    button#runBtn:disabled { background: #4a5568; cursor: not-allowed; }

    #status {
      padding: 12px 24px;
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #2d3148;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #summary {
      padding: 8px 24px 0;
      font-size: 0.82rem;
      color: #64748b;
    }

    #grid {
      padding: 16px 24px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #f97316; }
    .card.fire { border-color: #dc2626; }

    .card-img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      background: #0f1117;
      padding: 12px;
    }
    .card-img-placeholder {
      width: 100%;
      height: 80px;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .card-store-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .store-logo {
      height: 18px;
      width: auto;
      object-fit: contain;
      filter: brightness(0.9);
    }
    .card-store {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #f97316;
      font-weight: 600;
    }

    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-fire   { background: #7f1d1d; color: #fca5a5; }
    .badge-front  { background: #1e3a5f; color: #93c5fd; }
    .badge-pop    { background: #3b1f6e; color: #c4b5fd; }
    .badge-new    { background: #14532d; color: #86efac; }
    .badge-rebate { background: #78350f; color: #fcd34d; }

    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.4;
      flex: 1;
    }

    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-price { font-size: 1.1rem; font-weight: 700; color: #4ade80; }
    .card-orig { font-size: 0.82rem; color: #64748b; text-decoration: line-through; }
    .card-discount {
      font-size: 0.75rem;
      background: #14532d;
      color: #4ade80;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: #64748b;
      border-top: 1px solid #2d3148;
      padding-top: 8px;
      margin-top: auto;
      gap: 8px;
    }
    .votes { color: #4ade80; font-weight: 700; font-size: 0.85rem; white-space: nowrap; }
    .votes.zero { color: #64748b; }
    .meta-right { text-align: right; }

    .card-link {
      display: block;
      text-align: center;
      background: #0f1117;
      color: #f97316;
      padding: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border-top: 1px solid #2d3148;
      transition: background 0.1s;
    }
    .card-link:hover { background: #1e2235; }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #4a5568;
      padding: 60px 20px;
      font-size: 1rem;
    }

    #rawToggle {
      padding: 0 24px 8px;
      font-size: 0.78rem;
      color: #4a5568;
      cursor: pointer;
      text-decoration: underline;
    }
    #rawBox {
      display: none;
      margin: 0 24px 16px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.75rem;
      color: #94a3b8;
      max-height: 200px;
      overflow: auto;
      white-space: pre;
    }
  </style>
</head>
<body>

<header>
  <h1>SlickDeals Hot Deals</h1>
  <span id="headerSub">Sorted by votes</span>
</header>

<div class="controls">
  <div class="field">
    <label>Apify API Token</label>
    <input type="password" id="token" value="" placeholder="apify_api_..." />
  </div>
  <div class="field">
    <label>Max Results / Source</label>
    <select id="maxItems">
      <option value="50">50 / source (~$0.50 total)</option>
      <option value="100" selected>100 / source (~$1.00 total)</option>
      <option value="200">200 / source (~$2.00 total)</option>
    </select>
  </div>
  <div class="field">
    <label>Posted Within</label>
    <select id="timeWindow">
      <option value="6">Last 6 hours</option>
      <option value="12">Last 12 hours</option>
      <option value="24" selected>Last 24 hours</option>
      <option value="48">Last 48 hours</option>
      <option value="0">All results</option>
    </select>
  </div>
  <div class="field">
    <label>Min Votes</label>
    <select id="minVotes">
      <option value="0">Any</option>
      <option value="3" selected>3+</option>
      <option value="5">5+</option>
      <option value="10">10+</option>
      <option value="20">20+</option>
    </select>
  </div>
  <button id="runBtn" onclick="runScrape()">Fetch Deals</button>
</div>

<div id="status"><span class="spinner" id="spinner"></span><span id="statusText">Ready. Click "Fetch Deals" to start.</span></div>
<div id="summary"></div>
<div id="rawToggle" onclick="toggleRaw()" style="display:none">Show raw data (debug)</div>
<pre id="rawBox"></pre>
<div id="grid"></div>

<script>
const ACTOR_ID = 'powerai~slickdeals-search-scraper';

// All sources scraped every run — results are merged and deduplicated
const SOURCES = [
  { label: 'Frontpage',    url: 'https://slickdeals.net/deals/' },
  { label: 'Popular/Hot',  url: 'https://slickdeals.net/coupons/popular-deals/' },
  { label: 'Recent',       url: 'https://slickdeals.net/deals/?sortType=recent' },
];

function setStatus(msg, spinning = false) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('spinner').style.display = spinning ? 'block' : 'none';
}

async function runScrape() {
  const token = document.getElementById('token').value.trim();
  const maxItems = parseInt(document.getElementById('maxItems').value);
  if (!token) { alert('Enter your Apify API token.'); return; }

  document.getElementById('runBtn').disabled = true;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('summary').textContent = '';
  document.getElementById('rawToggle').style.display = 'none';

  try {
    // Kick off all runs in parallel
    setStatus(`Starting ${SOURCES.length} runs in parallel...`, true);
    const runIds = await Promise.all(SOURCES.map(s => startRun(token, s.url, maxItems)));

    // Poll all runs and collect datasets
    setStatus(`Waiting for all ${SOURCES.length} runs to finish...`, true);
    const datasetIds = await Promise.all(runIds.map((id, i) => waitForRun(id, token, SOURCES[i].label)));

    // Fetch all datasets
    setStatus('Fetching results from all sources...', true);
    const allArrays = await Promise.all(datasetIds.map(id => fetchDataset(id, token)));
    const combined = allArrays.flat();

    // Deduplicate by threadId
    const seen = new Set();
    const unique = combined.filter(d => {
      const key = d.threadId || d.uniqueId || d.dealTitle;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    if (unique.length === 0) {
      setStatus('No items returned from any source.');
      document.getElementById('runBtn').disabled = false;
      return;
    }

    document.getElementById('rawBox').textContent =
      `Total raw: ${combined.length} · After dedup: ${unique.length}\n\nFirst item:\n` +
      JSON.stringify(unique[0], null, 2);
    document.getElementById('rawToggle').style.display = 'block';

    renderDeals(unique);
    document.getElementById('runBtn').disabled = false;
    setStatus('Done.');

  } catch (err) {
    setStatus('Error: ' + err.message);
    document.getElementById('runBtn').disabled = false;
  }
}

async function startRun(token, url, maxItems) {
  const res = await fetch(
    `https://api.apify.com/v2/acts/${ACTOR_ID}/runs?token=${token}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, maxItems }),
    }
  );
  const json = await res.json();
  if (!json.data || !json.data.id) throw new Error('Failed to start run for ' + url);
  return json.data.id;
}

function waitForRun(runId, token, label) {
  return new Promise((resolve, reject) => {
    let attempts = 0;
    const timer = setInterval(async () => {
      attempts++;
      try {
        const res = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${token}`);
        const json = await res.json();
        const run = json.data;
        if (run.status === 'SUCCEEDED') {
          clearInterval(timer);
          resolve(run.defaultDatasetId);
        } else if (['FAILED', 'ABORTED', 'TIMED-OUT'].includes(run.status)) {
          clearInterval(timer);
          reject(new Error(`Run for "${label}" ${run.status}`));
        } else if (attempts >= 120) {
          clearInterval(timer);
          reject(new Error(`Run for "${label}" timed out`));
        }
      } catch (e) { clearInterval(timer); reject(e); }
    }, 5000);
  });
}

async function fetchDataset(datasetId, token) {
  const res = await fetch(
    `https://api.apify.com/v2/datasets/${datasetId}/items?token=${token}&limit=500&clean=true`
  );
  const items = await res.json();
  return Array.isArray(items) ? items : [];
}

function parseVotes(v) {
  if (v === null || v === undefined) return 0;
  if (typeof v === 'number') return v;
  const n = parseInt(String(v).replace(/[^0-9-]/g, ''));
  return isNaN(n) ? 0 : n;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.round(diff / 60) + 'm ago';
  if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
  return Math.round(diff / 86400) + 'd ago';
}

function isWithinWindow(dateStr) {
  const hours = parseInt(document.getElementById('timeWindow').value);
  if (!hours) return true; // "All results"
  if (!dateStr) return true;
  const d = new Date(dateStr);
  if (isNaN(d)) return true;
  return (Date.now() - d.getTime()) < hours * 3600000;
}

function renderDeals(rawItems) {
  const minVotes = parseInt(document.getElementById('minVotes').value);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const items = rawItems
    .filter(d => d.dealTitle && !d.isExpired)
    .filter(d => isWithinWindow(d.threadIsoDatetime))
    .filter(d => parseVotes(d.socialVoteCount) >= minVotes)
    .sort((a, b) => parseVotes(b.socialVoteCount) - parseVotes(a.socialVoteCount));

  const hours = parseInt(document.getElementById('timeWindow').value);
  const windowLabel = hours ? `last ${hours}h` : 'all time';
  document.getElementById('headerSub').textContent = `${windowLabel} · sorted by votes`;
  document.getElementById('summary').textContent =
    `${items.length} deals shown · ${rawItems.length} total from actor · filtered: ${windowLabel}, ${minVotes}+ votes`;

  if (items.length === 0) {
    grid.innerHTML = `<div class="empty">No deals matched the filters.<br>Try a wider time window or lower min votes.</div>`;
    return;
  }

  for (const d of items) {
    const votes = parseVotes(d.socialVoteCount);
    const ago = timeAgo(d.threadIsoDatetime);

    const badges = [];
    if (d.isFireDeal)      badges.push('<span class="badge badge-fire">Fire</span>');
    if (d.isFrontpageDeal) badges.push('<span class="badge badge-front">Frontpage</span>');
    if (d.isPopularDeal)   badges.push('<span class="badge badge-pop">Popular</span>');
    if (d.isNew)           badges.push('<span class="badge badge-new">New</span>');
    if (d.hasRebate)       badges.push('<span class="badge badge-rebate">Rebate</span>');

    const card = document.createElement('div');
    card.className = 'card' + (d.isFireDeal ? ' fire' : '');
    card.innerHTML = `
      ${d.dealImageUrl
        ? `<img class="card-img" src="${escHtml(d.dealImageUrl)}" alt="" onerror="this.style.display='none'" loading="lazy" />`
        : `<div class="card-img-placeholder">🏷️</div>`
      }
      <div class="card-body">
        <div class="card-store-row">
          ${d.storeLogoUrl ? `<img class="store-logo" src="${escHtml(d.storeLogoUrl)}" alt="${escHtml(d.storeName || '')}" onerror="this.style.display='none'" />` : ''}
          ${d.storeName ? `<span class="card-store">${escHtml(d.storeName)}</span>` : ''}
        </div>
        ${badges.length ? `<div class="card-badges">${badges.join('')}</div>` : ''}
        <div class="card-title">${escHtml(d.dealTitle)}</div>
        ${(d.finalPriceText || d.listPriceText || d.discount) ? `
        <div class="card-price-row">
          ${d.finalPriceText ? `<span class="card-price">${escHtml(d.finalPriceText)}</span>` : ''}
          ${d.listPriceText  ? `<span class="card-orig">${escHtml(d.listPriceText)}</span>` : ''}
          ${d.discount       ? `<span class="card-discount">${escHtml(String(d.discount))}% off</span>` : ''}
        </div>` : ''}
        <div class="card-meta">
          <span class="votes ${votes === 0 ? 'zero' : ''}">▲ ${votes}</span>
          <span class="meta-right">
            ${ago}
            ${d.socialCommentCount ? ` · ${d.socialCommentCount} comments` : ''}
            ${d.viewsCount ? ` · ${d.viewsCount.toLocaleString()} views` : ''}
          </span>
        </div>
      </div>
      <a class="card-link" href="${escHtml(d.dealThreadUrl)}" target="_blank" rel="noopener">View Deal →</a>
    `;
    grid.appendChild(card);
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function toggleRaw() {
  const box = document.getElementById('rawBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}
</script>
</body>
</html>
