<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SlickDeals — Best Deals Last 24h</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #f97316; }
    header span { font-size: 0.85rem; color: #64748b; }

    .controls {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input, .field select {
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      min-width: 200px;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #f97316;
    }

    button#runBtn {
      background: #f97316;
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      height: 38px;
      align-self: flex-end;
    }
    button#runBtn:hover { background: #ea6c0a; }
    button#runBtn:disabled { background: #4a5568; cursor: not-allowed; }

    #status {
      padding: 12px 24px;
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #2d3148;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #summary {
      padding: 8px 24px 0;
      font-size: 0.82rem;
      color: #64748b;
    }

    #grid {
      padding: 16px 24px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #f97316; }

    .card-img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      background: #0f1117;
      padding: 12px;
    }
    .card-img-placeholder {
      width: 100%;
      height: 80px;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .card-store {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #f97316;
      font-weight: 600;
    }

    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.4;
      flex: 1;
    }

    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-price { font-size: 1.1rem; font-weight: 700; color: #4ade80; }
    .card-orig { font-size: 0.82rem; color: #64748b; text-decoration: line-through; }
    .card-discount {
      font-size: 0.75rem;
      background: #14532d;
      color: #4ade80;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: #64748b;
      border-top: 1px solid #2d3148;
      padding-top: 8px;
      margin-top: auto;
    }
    .votes { color: #4ade80; font-weight: 700; font-size: 0.85rem; }
    .votes.zero { color: #64748b; }

    .card-link {
      display: block;
      text-align: center;
      background: #0f1117;
      color: #f97316;
      padding: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border-top: 1px solid #2d3148;
      transition: background 0.1s;
    }
    .card-link:hover { background: #1e2235; }

    .badge-hot {
      display: inline-block;
      background: #7c2d12;
      color: #fb923c;
      font-size: 0.68rem;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #4a5568;
      padding: 60px 20px;
      font-size: 1rem;
    }

    #rawToggle {
      padding: 0 24px 8px;
      font-size: 0.78rem;
      color: #4a5568;
      cursor: pointer;
      text-decoration: underline;
    }
    #rawBox {
      display: none;
      margin: 0 24px 16px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.75rem;
      color: #94a3b8;
      max-height: 200px;
      overflow: auto;
      white-space: pre;
    }
  </style>
</head>
<body>

<header>
  <h1>SlickDeals Hot Deals</h1>
  <span>Last 24 hours · Sorted by votes</span>
</header>

<div class="controls">
  <div class="field">
    <label>Apify API Token</label>
    <input type="password" id="token" value="" placeholder="apify_api_..." />
  </div>
  <div class="field">
    <label>Source</label>
    <select id="sourceUrl">
      <option value="https://slickdeals.net/newsearch.php?mode=frontpage&sortby=votes">Frontpage — by Votes</option>
      <option value="https://slickdeals.net/newsearch.php?mode=frontpage&sortby=newest">Frontpage — Newest</option>
      <option value="https://slickdeals.net/newsearch.php?mode=popdeals&sortby=votes">Hot Deals — by Votes</option>
      <option value="https://slickdeals.net/newsearch.php?mode=popdeals&sortby=newest">Hot Deals — Newest</option>
    </select>
  </div>
  <div class="field">
    <label>Max Results</label>
    <select id="maxItems">
      <option value="50">50 items (~$0.25)</option>
      <option value="100" selected>100 items (~$0.50)</option>
      <option value="200">200 items (~$1.00)</option>
    </select>
  </div>
  <div class="field">
    <label>Min Votes</label>
    <select id="minVotes">
      <option value="0">Any</option>
      <option value="3">3+</option>
      <option value="5" selected>5+</option>
      <option value="10">10+</option>
      <option value="20">20+</option>
    </select>
  </div>
  <button id="runBtn" onclick="runScrape()">Fetch Deals</button>
</div>

<div id="status"><span class="spinner" id="spinner"></span><span id="statusText">Ready. Click "Fetch Deals" to start.</span></div>
<div id="summary"></div>
<div id="rawToggle" onclick="toggleRaw()" style="display:none">Show raw field names (debug)</div>
<pre id="rawBox"></pre>
<div id="grid"></div>

<script>
const ACTOR_ID = 'powerai~slickdeals-search-scraper';
let pollInterval = null;

function setStatus(msg, spinning = false) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('spinner').style.display = spinning ? 'block' : 'none';
}

async function runScrape() {
  const token = document.getElementById('token').value.trim();
  const url = document.getElementById('sourceUrl').value;
  const maxItems = parseInt(document.getElementById('maxItems').value);

  if (!token) { alert('Enter your Apify API token.'); return; }

  document.getElementById('runBtn').disabled = true;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('summary').textContent = '';
  document.getElementById('rawToggle').style.display = 'none';

  setStatus('Starting actor run on Apify...', true);

  try {
    // Try a few common input formats that URL-based Apify scrapers accept
    const inputCandidates = [
      { url, maxItems },
      { startUrls: [{ url }], maxItems },
      { searchUrl: url, maxItems },
      { urls: [url], maxItems },
    ];

    let runData = null;
    let lastError = null;

    for (const input of inputCandidates) {
      try {
        const res = await fetch(
          `https://api.apify.com/v2/acts/${ACTOR_ID}/runs?token=${token}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(input),
          }
        );
        const json = await res.json();
        if (json.data && json.data.id) {
          runData = json.data;
          break;
        }
        lastError = json;
      } catch (e) {
        lastError = e;
      }
    }

    if (!runData) {
      throw new Error('Could not start actor run. ' + JSON.stringify(lastError));
    }

    const runId = runData.id;
    setStatus(`Run started (${runId}). Waiting for completion...`, true);
    pollForCompletion(runId, token);

  } catch (err) {
    setStatus('Error: ' + err.message);
    document.getElementById('runBtn').disabled = false;
  }
}

function pollForCompletion(runId, token) {
  let attempts = 0;
  const maxAttempts = 120; // 10 min max

  pollInterval = setInterval(async () => {
    attempts++;
    try {
      const res = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${token}`);
      const json = await res.json();
      const run = json.data;
      const status = run.status;
      const elapsed = Math.round((Date.now() - new Date(run.startedAt).getTime()) / 1000);

      setStatus(`Run ${status} — ${elapsed}s elapsed...`, status === 'RUNNING');

      if (status === 'SUCCEEDED') {
        clearInterval(pollInterval);
        setStatus('Run complete. Fetching results...', true);
        fetchResults(run.defaultDatasetId, token);
      } else if (['FAILED', 'ABORTED', 'TIMED-OUT'].includes(status)) {
        clearInterval(pollInterval);
        setStatus(`Run ${status}. Check Apify console for details.`);
        document.getElementById('runBtn').disabled = false;
      } else if (attempts >= maxAttempts) {
        clearInterval(pollInterval);
        setStatus('Timed out waiting. Check Apify console.');
        document.getElementById('runBtn').disabled = false;
      }
    } catch (e) {
      setStatus('Poll error: ' + e.message);
    }
  }, 5000);
}

async function fetchResults(datasetId, token) {
  try {
    const res = await fetch(
      `https://api.apify.com/v2/datasets/${datasetId}/items?token=${token}&limit=500&clean=true`
    );
    const items = await res.json();

    if (!Array.isArray(items) || items.length === 0) {
      setStatus('No items returned. The actor may need a different input URL.');
      document.getElementById('runBtn').disabled = false;
      return;
    }

    // Debug: show raw field names from first item
    const rawKeys = Object.keys(items[0]);
    document.getElementById('rawBox').textContent =
      'Fields in first item:\n' + rawKeys.join('\n') +
      '\n\nFirst item:\n' + JSON.stringify(items[0], null, 2);
    document.getElementById('rawToggle').style.display = 'block';

    renderDeals(items);
    document.getElementById('runBtn').disabled = false;
    setStatus('Done.');
  } catch (err) {
    setStatus('Error fetching results: ' + err.message);
    document.getElementById('runBtn').disabled = false;
  }
}

// Normalize field names across different actor output schemas
function normalize(item) {
  const get = (...keys) => {
    for (const k of keys) {
      if (item[k] !== undefined && item[k] !== null && item[k] !== '') return item[k];
    }
    return null;
  };

  const title = get('title', 'name', 'dealTitle', 'headline', 'subject');
  const dealUrl = get('url', 'dealUrl', 'link', 'dealLink', 'href', 'threadUrl');
  const merchantUrl = get('merchantUrl', 'directUrl', 'storeUrl', 'originalUrl', 'affiliateUrl');
  const finalUrl = merchantUrl || dealUrl;

  const store = get('store', 'merchant', 'storeName', 'retailer', 'vendor');
  const image = get('image', 'imageUrl', 'thumbnail', 'img', 'photo', 'picture');

  const price = get('price', 'dealPrice', 'salePrice', 'discountedPrice', 'currentPrice', 'finalPrice');
  const originalPrice = get('originalPrice', 'regularPrice', 'wasPrice', 'listPrice', 'msrp', 'retailPrice');
  const discount = get('discount', 'savings', 'discountPercent', 'savingsPercent', 'percentOff', 'percentSavings');

  // Votes: try many field names
  const votes = get('votes', 'thumbsUp', 'upvotes', 'score', 'rating', 'likes', 'positiveVotes', 'hotness', 'popularity', 'voteCount', 'totalVotes', 'points');
  const downvotes = get('thumbsDown', 'downvotes', 'negativeVotes');

  // Timestamp
  const postedAt = get('postedAt', 'createdAt', 'publishedAt', 'date', 'timestamp', 'datePosted', 'postDate', 'startDate', 'pubDate');

  const status = get('status', 'dealStatus', 'label', 'badge');
  const comments = get('comments', 'commentCount', 'replies', 'numComments');

  return { title, dealUrl, merchantUrl: finalUrl, store, image, price, originalPrice, discount, votes, downvotes, postedAt, status, comments };
}

function parseVotes(v) {
  if (v === null || v === undefined) return 0;
  if (typeof v === 'number') return v;
  const n = parseInt(String(v).replace(/[^0-9-]/g, ''));
  return isNaN(n) ? 0 : n;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.round(diff / 60) + 'm ago';
  if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
  return Math.round(diff / 86400) + 'd ago';
}

function isWithin24h(dateStr) {
  if (!dateStr) return true; // include if no date
  const d = new Date(dateStr);
  if (isNaN(d)) return true;
  return (Date.now() - d.getTime()) < 86400000;
}

function formatPrice(p) {
  if (!p) return null;
  const s = String(p).trim();
  if (s.startsWith('$')) return s;
  const n = parseFloat(s);
  if (!isNaN(n)) return '$' + n.toFixed(2);
  return s;
}

function renderDeals(rawItems) {
  const minVotes = parseInt(document.getElementById('minVotes').value);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const items = rawItems
    .map(normalize)
    .filter(d => d.title)
    .filter(d => isWithin24h(d.postedAt))
    .filter(d => parseVotes(d.votes) >= minVotes)
    .sort((a, b) => parseVotes(b.votes) - parseVotes(a.votes));

  document.getElementById('summary').textContent =
    `${items.length} deals found (${rawItems.length} total from actor, filtered to last 24h with ${minVotes}+ votes)`;

  if (items.length === 0) {
    grid.innerHTML = `<div class="empty">No deals matched the filters.<br>Try lowering the min votes or check the debug fields below.</div>`;
    return;
  }

  for (const d of items) {
    const votes = parseVotes(d.votes);
    const priceStr = formatPrice(d.price);
    const origStr = formatPrice(d.originalPrice);
    const ago = timeAgo(d.postedAt);
    const isHot = votes >= 20;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      ${d.image
        ? `<img class="card-img" src="${escHtml(d.image)}" alt="" onerror="this.style.display='none'" loading="lazy" />`
        : `<div class="card-img-placeholder">🏷️</div>`
      }
      <div class="card-body">
        ${d.store ? `<div class="card-store">${escHtml(d.store)}</div>` : ''}
        <div class="card-title">
          ${isHot ? '<span class="badge-hot">Hot</span> ' : ''}${escHtml(d.title)}
        </div>
        ${priceStr ? `
        <div class="card-price-row">
          <span class="card-price">${escHtml(priceStr)}</span>
          ${origStr ? `<span class="card-orig">${escHtml(origStr)}</span>` : ''}
          ${d.discount ? `<span class="card-discount">${escHtml(String(d.discount))}% off</span>` : ''}
        </div>` : ''}
        <div class="card-meta">
          <span class="votes ${votes === 0 ? 'zero' : ''}">
            ${votes > 0 ? '▲ ' + votes + ' votes' : 'No votes'}
            ${d.downvotes ? ' / ▼ ' + parseVotes(d.downvotes) : ''}
          </span>
          <span>${ago}${d.comments ? ' · ' + d.comments + ' comments' : ''}</span>
        </div>
      </div>
      ${d.merchantUrl
        ? `<a class="card-link" href="${escHtml(d.merchantUrl)}" target="_blank" rel="noopener">Go to Deal →</a>`
        : ''
      }
    `;
    grid.appendChild(card);
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function toggleRaw() {
  const box = document.getElementById('rawBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}
</script>
</body>
</html>
